---

services:

  app:
    build:
      context: .
    container_name: rus-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HOST: 0.0.0.0
      RUST_LOG: debug
    volumes:
      - ./src:/app/src
      - ./static:/app/static
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_target:/app/target

volumes:
  cargo_target:
