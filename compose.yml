---

services:

  app:
    build:
      context: .
    container_name: rus-dev
    restart: unless-stopped
    # ports:
    # - "8080:8080"
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      RUST_LOG: info
    volumes:
      - rus-data:/data
      - ./src:/app/src
      - ./static:/app/static
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_target:/app/target
      - rus-data:/data

volumes:
  cargo_target:
  rus-data:
