<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Rust URL Shortener</title>
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="/" class="nav-brand">🦀 Rust URL Shortener</a>
            <div class="nav-links">
                <a href="dashboard.html">My Dashboard</a>
                <span class="user-info">👤 <span id="username"></span> (Admin)</span>
                <button id="logoutBtn" class="logout-btn">Log Out</button>
            </div>
        </div>
    </nav>

    <div class="container dashboard">
        <div class="dashboard-header">
            <h1>Admin Dashboard</h1>
            <p class="subtitle">System administration and user management</p>
        </div>

        <!-- System Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <div class="stat-value" id="totalUsers">-</div>
                    <div class="stat-label">Total Users</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔗</div>
                <div class="stat-info">
                    <div class="stat-value" id="totalUrls">-</div>
                    <div class="stat-label">Total URLs</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👆</div>
                <div class="stat-info">
                    <div class="stat-value" id="totalClicks">-</div>
                    <div class="stat-label">Total Clicks</div>
                </div>
            </div>
        </div>

        <!-- Users Management -->
        <div class="users-section">
            <div class="section-header">
                <h2>User Management</h2>
                <button id="refreshBtn" class="refresh-btn">🔄 Refresh</button>
            </div>

            <div id="loading" class="loading">Loading users...</div>
            <div class="error" id="error"></div>
            <div class="success" id="success"></div>

            <div id="usersTable" class="users-table"></div>
        </div>

        <!-- Abuse Reports Management -->
        <div class="users-section" style="margin-top: 30px;">
            <div class="section-header">
                <h2>Abuse Reports</h2>
                <button id="refreshReportsBtn" class="refresh-btn">🔄 Refresh</button>
            </div>

            <div id="loadingReports" class="loading" style="display: none;">Loading reports...</div>
            <div class="error" id="reportsError"></div>
            <div class="success" id="reportsSuccess"></div>

            <div id="reportsTable" class="users-table"></div>
        </div>
    </div>

    <script src="k9f3x2m7.js"></script>
    <script>
        // Check authentication
        const token = getToken();
        const username = getUsername();

        if (!token) {
            window.location.href = 'login.html';
        }

        // Display username
        document.getElementById('username').textContent = username;

        // Elements
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const usersTable = document.getElementById('usersTable');
        const logoutBtn = document.getElementById('logoutBtn');
        const refreshBtn = document.getElementById('refreshBtn');

        // Logout handler
        logoutBtn.addEventListener('click', () => {
            logout();
            window.location.href = 'login.html';
        });

        // Check if user is actually an admin
        async function checkAdminAccess() {
            try {
                const response = await fetch('/api/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    window.location.href = 'login.html';
                    return;
                }

                const data = await response.json();
                if (!data.is_admin) {
                    alert('Access denied: Admin privileges required');
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                console.error('Failed to verify admin access:', error);
                window.location.href = 'dashboard.html';
            }
        }

        // Load system statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/stats', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        // Let loadUsers handle the redirect
                        return;
                    }
                    throw new Error('Failed to load statistics');
                }

                const stats = await response.json();
                document.getElementById('totalUsers').textContent = stats.total_users;
                document.getElementById('totalUrls').textContent = stats.total_urls;
                document.getElementById('totalClicks').textContent = stats.total_clicks;
            } catch (error) {
                console.error('Failed to load stats:', error);
                // Don't show error to user for stats, just log it
                document.getElementById('totalUsers').textContent = 'N/A';
                document.getElementById('totalUrls').textContent = 'N/A';
                document.getElementById('totalClicks').textContent = 'N/A';
            }
        }

        // Load users list
        async function loadUsers() {
            loading.style.display = 'block';
            usersTable.innerHTML = '';
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');

            try {
                const response = await fetch('/api/admin/users', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        alert('Your session has expired. Please log in again.');
                        window.location.href = 'login.html';
                        return;
                    }
                    if (response.status === 403) {
                        alert('Access denied: Admin privileges required');
                        window.location.href = 'dashboard.html';
                        return;
                    }
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `Server error: ${response.status}`);
                }

                const users = await response.json();
                loading.style.display = 'none';

                if (users.length === 0) {
                    usersTable.innerHTML = '<p class="empty-state">No users found</p>';
                    return;
                }

                // Create table
                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role</th>
                            <th>URLs Created</th>
                            <th>Created At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                `;
                usersTable.appendChild(table);

                const tbody = document.getElementById('usersTableBody');
                users.forEach(user => {
                    const row = createUserRow(user);
                    tbody.appendChild(row);
                });

            } catch (error) {
                loading.style.display = 'none';
                console.error('Error loading users:', error);
                showError(error.message);
            }
        }

        // Create user row
        function createUserRow(user) {
            const row = document.createElement('tr');

            const roleText = user.is_admin ? '👑 Admin' : 'User';
            const createdDate = new Date(user.created_at).toLocaleDateString();

            const tdUsername = document.createElement('td');
            const strong = document.createElement('strong');
            strong.textContent = user.username;
            tdUsername.appendChild(strong);

            const tdRole = document.createElement('td');
            tdRole.textContent = roleText;

            const tdUrls = document.createElement('td');
            tdUrls.textContent = user.url_count;

            const tdDate = document.createElement('td');
            tdDate.textContent = createdDate;

            const tdActions = document.createElement('td');
            if (!user.is_admin) {
                const actionsDiv = document.createElement('div');
                actionsDiv.style.display = 'flex';
                actionsDiv.style.gap = '5px';

                const promoteBtn = document.createElement('button');
                promoteBtn.className = 'promote-user-btn';
                promoteBtn.title = 'Promote to Admin';
                promoteBtn.textContent = '👑 Promote';
                promoteBtn.addEventListener('click', () => promoteUser(user.user_id, user.username));

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-user-btn';
                deleteBtn.textContent = 'Delete';
                deleteBtn.addEventListener('click', () => deleteUser(user.user_id, user.username));

                actionsDiv.appendChild(promoteBtn);
                actionsDiv.appendChild(deleteBtn);
                tdActions.appendChild(actionsDiv);
            } else {
                const protectedSpan = document.createElement('span');
                protectedSpan.className = 'text-muted';
                protectedSpan.textContent = 'Protected';
                tdActions.appendChild(protectedSpan);
            }

            row.appendChild(tdUsername);
            row.appendChild(tdRole);
            row.appendChild(tdUrls);
            row.appendChild(tdDate);
            row.appendChild(tdActions);

            return row;
        }

        // Delete user
        window.deleteUser = async function(userId, username) {
            if (!confirm(`Are you sure you want to delete user "${username}"?\n\nThis will also delete all their URLs and data. This action cannot be undone.`)) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to delete user');
                }

                // Show success message
                successDiv.innerHTML = `<strong>✓ User "${username}" deleted successfully</strong>`;
                successDiv.classList.add('show');

                // Reload data
                await loadUsers();
                await loadStats();

                setTimeout(() => {
                    successDiv.classList.remove('show');
                }, 3000);

            } catch (error) {
                showError('Failed to delete user: ' + error.message);
            }
        };

        // Promote user to admin
        window.promoteUser = async function(userId, username) {
            if (!confirm(`Are you sure you want to promote user "${username}" to admin?\n\nAdmins have full access to manage users, URLs, and reports.`)) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/users/${userId}/promote`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to promote user');
                }

                // Show success message
                successDiv.innerHTML = `<strong>✓ ${data.message}</strong>`;
                successDiv.classList.add('show');

                // Reload data
                await loadUsers();
                await loadStats();

                setTimeout(() => {
                    successDiv.classList.remove('show');
                }, 3000);

            } catch (error) {
                showError('Failed to promote user: ' + error.message);
            }
        };

        // Refresh button
        refreshBtn.addEventListener('click', async () => {
            await loadUsers();
            await loadStats();
        });

        // Show error
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        // Initial load
        checkAdminAccess();
        loadStats();
        loadUsers();

        // ============= Abuse Reports Management =============
        const loadingReports = document.getElementById('loadingReports');
        const reportsError = document.getElementById('reportsError');
        const reportsSuccess = document.getElementById('reportsSuccess');
        const reportsTable = document.getElementById('reportsTable');
        const refreshReportsBtn = document.getElementById('refreshReportsBtn');

        // Load abuse reports
        async function loadReports() {
            loadingReports.style.display = 'block';
            reportsTable.innerHTML = '';
            reportsError.classList.remove('show');
            reportsSuccess.classList.remove('show');

            try {
                const response = await fetch('/api/admin/reports', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load reports');
                }

                const reports = await response.json();
                loadingReports.style.display = 'none';

                if (reports.length === 0) {
                    reportsTable.innerHTML = '<p class="empty-state">No abuse reports</p>';
                    return;
                }

                // Create table
                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Short Code</th>
                            <th>Reason</th>
                            <th>Reporter</th>
                            <th>Reported</th>
                            <th>Owner</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reportsTableBody"></tbody>
                `;
                reportsTable.appendChild(table);

                const tbody = document.getElementById('reportsTableBody');
                reports.forEach(report => {
                    const row = createReportRow(report);
                    tbody.appendChild(row);
                });

            } catch (error) {
                loadingReports.style.display = 'none';
                console.error('Error loading reports:', error);
                showReportsError(error.message);
            }
        }

        // Create report row
        function createReportRow(report) {
            const row = document.createElement('tr');

            // Status badge
            const tdStatus = document.createElement('td');
            const statusBadge = document.createElement('span');
            statusBadge.style.cssText = 'color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.85em;';
            if (report.status === 'pending') {
                statusBadge.style.background = '#f59e0b';
                statusBadge.textContent = '⏳ Pending';
            } else if (report.status === 'resolved') {
                statusBadge.style.background = '#22c55e';
                statusBadge.textContent = '✓ Resolved';
            } else {
                statusBadge.style.background = '#6b7280';
                statusBadge.textContent = 'Dismissed';
            }
            tdStatus.appendChild(statusBadge);

            // Short code + original URL
            const tdCode = document.createElement('td');
            const codeStrong = document.createElement('strong');
            codeStrong.style.color = 'var(--rust-orange)';
            codeStrong.textContent = report.short_code;
            tdCode.appendChild(codeStrong);
            tdCode.appendChild(document.createElement('br'));
            const urlSmall = document.createElement('small');
            urlSmall.style.cssText = 'color: var(--text-muted); font-size: 0.85em;';
            urlSmall.textContent = report.original_url || 'URL deleted';
            tdCode.appendChild(urlSmall);

            // Reason + description
            const tdReason = document.createElement('td');
            const reasonStrong = document.createElement('strong');
            reasonStrong.textContent = report.reason;
            tdReason.appendChild(reasonStrong);
            if (report.description) {
                tdReason.appendChild(document.createElement('br'));
                const descSmall = document.createElement('small');
                descSmall.style.color = 'var(--text-secondary)';
                descSmall.textContent = report.description;
                tdReason.appendChild(descSmall);
            }

            // Reporter email
            const tdReporter = document.createElement('td');
            tdReporter.style.fontSize = '0.9em';
            tdReporter.textContent = report.reporter_email || 'Anonymous';

            // Date
            const tdDate = document.createElement('td');
            tdDate.style.fontSize = '0.9em';
            tdDate.textContent = new Date(report.created_at).toLocaleDateString();

            // Owner
            const tdOwner = document.createElement('td');
            tdOwner.textContent = report.url_owner_username || 'Unknown';

            // Actions
            const tdActions = document.createElement('td');
            if (report.status === 'pending') {
                const actionsDiv = document.createElement('div');
                actionsDiv.style.cssText = 'display: flex; gap: 5px; flex-direction: column;';

                const dismissBtn = document.createElement('button');
                dismissBtn.className = 'action-btn-small';
                dismissBtn.style.background = '#6b7280';
                dismissBtn.textContent = 'Dismiss';
                dismissBtn.addEventListener('click', () => resolveReport(report.id, 'dismiss'));

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'action-btn-small';
                deleteBtn.style.background = 'var(--error)';
                deleteBtn.textContent = 'Delete URL';
                deleteBtn.addEventListener('click', () => resolveReport(report.id, 'delete_url'));

                const banBtn = document.createElement('button');
                banBtn.className = 'action-btn-small';
                banBtn.style.background = '#dc2626';
                banBtn.textContent = 'Ban User';
                banBtn.addEventListener('click', () => resolveReport(report.id, 'ban_user'));

                actionsDiv.appendChild(dismissBtn);
                actionsDiv.appendChild(deleteBtn);
                actionsDiv.appendChild(banBtn);
                tdActions.appendChild(actionsDiv);
            } else {
                const resolvedSpan = document.createElement('span');
                resolvedSpan.className = 'text-muted';
                resolvedSpan.textContent = 'Resolved';
                tdActions.appendChild(resolvedSpan);
            }

            row.appendChild(tdStatus);
            row.appendChild(tdCode);
            row.appendChild(tdReason);
            row.appendChild(tdReporter);
            row.appendChild(tdDate);
            row.appendChild(tdOwner);
            row.appendChild(tdActions);

            return row;
        }

        // Resolve report
        window.resolveReport = async function(reportId, action) {
            const actionText = action === 'dismiss' ? 'dismiss this report'
                : action === 'delete_url' ? 'delete this URL'
                : 'ban this user and delete all their URLs';

            if (!confirm(`Are you sure you want to ${actionText}?\n\nThis action cannot be undone.`)) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/reports/${reportId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ action })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to resolve report');
                }

                // Show success message
                reportsSuccess.innerHTML = `<strong>✓ ${data.message}</strong>`;
                reportsSuccess.classList.add('show');

                // Reload data
                await loadReports();
                await loadUsers();
                await loadStats();

                setTimeout(() => {
                    reportsSuccess.classList.remove('show');
                }, 3000);

            } catch (error) {
                showReportsError('Failed to resolve report: ' + error.message);
            }
        };

        // Refresh reports button
        refreshReportsBtn.addEventListener('click', loadReports);

        // Show reports error
        function showReportsError(message) {
            reportsError.textContent = message;
            reportsError.classList.add('show');
        }

        // Load reports on page load
        loadReports();
    </script>

    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .stat-icon {
            font-size: 2.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--rust-orange);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .users-section {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        .users-table table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .users-table th,
        .users-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .users-table th {
            background: var(--bg-dark);
            font-weight: 600;
            color: var(--text-primary);
        }

        .users-table tr {
            transition: background 0.2s;
        }

        .users-table tr:hover {
            background: var(--bg-card-hover);
        }

        .promote-user-btn {
            background: linear-gradient(135deg, var(--rust-orange) 0%, var(--rust-orange-dark) 100%);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .promote-user-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 76, 0, 0.5);
        }

        .delete-user-btn {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.3s;
        }

        .delete-user-btn:hover {
            background: #dc2626;
        }

        .text-muted {
            color: var(--text-muted);
            font-style: italic;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .action-btn-small {
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: opacity 0.2s;
            width: 100%;
        }

        .action-btn-small:hover {
            opacity: 0.8;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
    </style>
</body>
</html>
