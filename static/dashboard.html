<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Rust URL Shortener</title>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-content">
        <a href="/" class="nav-brand">🦀 Rust URL Shortener</a>
        <div class="nav-links">
          <span id="maintenanceBadge" class="maintenance-badge" style="display: none">Maintenance Mode</span>
          <a href="admin.html" id="adminLink" style="display: none" class="admin-link">⚙️ Admin</a>
          <span class="user-info">👤 <span id="username"></span></span>
          <button id="logoutBtn" class="logout-btn">Log Out</button>
        </div>
      </div>
    </nav>

    <div class="container dashboard">
      <div class="dashboard-header">
        <h1>My Dashboard</h1>
        <p class="subtitle">Manage your shortened URLs</p>
      </div>

      <div class="create-section accent-card">
        <div class="accent-card-body">
          <h2>Create New Short URL</h2>
          <form id="createForm">
            <div class="input-group">
              <label for="urlInput">Enter your long URL:</label>
              <input type="url" id="urlInput" placeholder="https://example.com/very/long/url" required />
            </div>
            <button type="submit" id="createBtn">Shorten URL</button>
          </form>
          <div class="error" id="error"></div>
          <div class="success" id="success"></div>
        </div>
      </div>

      <div class="urls-section accent-card">
        <div class="accent-card-body">
          <div class="section-header">
            <h2>Your URLs</h2>
            <button id="refreshBtn" class="refresh-btn">🔄 Refresh</button>
          </div>

          <div id="loading" class="loading">Loading your URLs...</div>
          <div id="emptyState" class="empty-state" style="display: none">
            <div class="empty-icon">📎</div>
            <h3>No URLs yet</h3>
            <p>Create your first shortened URL using the form above!</p>
          </div>

          <div id="urlsList" class="urls-list"></div>
        </div>
      </div>
    </div>

    <!-- QR Code Modal -->
    <div id="qrModal" class="modal" style="display: none">
      <div class="modal-content">
        <div class="modal-header">
          <h2>QR Code</h2>
          <button class="modal-close" onclick="closeQRModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div id="qrLoading" class="loading">Generating QR code...</div>
          <div id="qrDisplay" style="display: none">
            <img id="qrImage" src="" alt="QR Code" class="qr-image" />
            <p class="qr-url" id="qrUrl"></p>
          </div>
        </div>
        <div class="modal-footer">
          <button class="download-btn" onclick="downloadQR('png')" id="downloadPngBtn" style="display: none">
            Download PNG
          </button>
          <button class="download-btn" onclick="downloadQR('svg')" id="downloadSvgBtn" style="display: none">
            Download SVG
          </button>
        </div>
      </div>
    </div>

    <script src="k9f3x2m7.js"></script>
    <script>
      // Determine auth mode and login redirect URL
      let authMode = 'standalone';
      let loginRedirect = 'login.html';
      let logoutRedirect = 'login.html';

      async function initDashboard() {
        try {
          const configResp = await fetch('/api/config');
          const config = await configResp.json();
          authMode = config.auth_mode || 'standalone';
          if (authMode === 'saas' && config.login_url) {
            const returnUrl = encodeURIComponent(window.location.href);
            loginRedirect = `${config.login_url}?redirect=${returnUrl}`;
            if (config.logout_url) {
              logoutRedirect = `${config.logout_url}?url=${returnUrl}`;
            }
          }
          // Show maintenance badge if active
          if (config.maintenance_mode) {
            document.getElementById('maintenanceBadge').style.display = 'inline-flex';
          }
          // Load SaaS token refresh script
          if (authMode === 'saas') {
            var s = document.createElement('script');
            s.src = 'saas-refresh.js';
            document.head.appendChild(s);
          }
        } catch (e) {
          console.error('Failed to load config:', e);
        }

        // Check authentication
        if (authMode === 'standalone') {
          const token = getToken();
          if (!token) {
            window.location.href = loginRedirect;
            return;
          }
          document.getElementById("username").textContent = getUsername();
          checkAdminStatus();
        } else {
          // SaaS mode: fetch username from server
          try {
            const meResp = await apiFetch('/api/me');
            if (meResp) {
              const me = await meResp.json();
              document.getElementById("username").textContent = me.username || "User";
            }
          } catch (e) {
            document.getElementById("username").textContent = "User";
          }
        }

        loadUrls();
      }

      // Check if user is admin and show admin link
      async function checkAdminStatus() {
        try {
          const response = await fetch("/api/me", {
            headers: {
              Authorization: `Bearer ${getToken()}`,
            },
          });

          if (response.ok) {
            const data = await response.json();
            if (data.is_admin) {
              document.getElementById("adminLink").style.display = "inline";
            }
          }
        } catch (error) {
          console.error("Failed to check admin status:", error);
        }
      }

      // Helper: returns auth headers for standalone mode, empty for SaaS (cookie-based)
      function authHeaders(extra = {}) {
        if (authMode === 'saas') return extra;
        const token = getToken();
        return token ? { ...extra, Authorization: `Bearer ${token}` } : extra;
      }

      // Helper: fetch with credentials (cookies for SaaS, Bearer token for standalone)
      async function apiFetch(url, options = {}) {
        options.headers = authHeaders(options.headers || {});
        if (authMode === 'saas') options.credentials = 'include';
        const response = await fetch(url, options);
        if (response.status === 401) {
          if (authMode === 'standalone') logout();
          window.location.href = loginRedirect;
          return null;
        }
        if (response.status === 403) {
          try {
            const data = await response.clone().json();
            if (data.redirect) {
              window.location.href = data.redirect;
              return null;
            }
          } catch (_) {}
        }
        return response;
      }

      // Elements
      const createForm = document.getElementById("createForm");
      const urlInput = document.getElementById("urlInput");
      const createBtn = document.getElementById("createBtn");
      const errorDiv = document.getElementById("error");
      const successDiv = document.getElementById("success");
      const urlsList = document.getElementById("urlsList");
      const loading = document.getElementById("loading");
      const emptyState = document.getElementById("emptyState");
      const logoutBtn = document.getElementById("logoutBtn");
      const refreshBtn = document.getElementById("refreshBtn");

      // Logout handler
      logoutBtn.addEventListener("click", () => {
        if (authMode === 'standalone') logout();
        window.location.href = (authMode === 'saas') ? logoutRedirect : loginRedirect;
      });

      // Create URL handler
      createForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const url = urlInput.value.trim();
        if (!url) return;

        errorDiv.classList.remove("show");
        successDiv.classList.remove("show");
        createBtn.disabled = true;
        createBtn.textContent = "Shortening...";

        try {
          const response = await apiFetch("/api/shorten", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url }),
          });
          if (!response) return;

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Failed to shorten URL");
          }

          // Show success message
          const shortUrl = `${window.location.origin}/${data.short_code}`;
          successDiv.innerHTML = `
                    <strong>✓ URL shortened successfully!</strong><br>
                    Short URL: <a href="/${data.short_code}" target="_blank">${shortUrl}</a>
                `;
          successDiv.classList.add("show");

          // Clear form
          urlInput.value = "";

          // Reload URLs list
          await loadUrls();
        } catch (error) {
          showError(error.message);
        } finally {
          createBtn.disabled = false;
          createBtn.textContent = "Shorten URL";
        }
      });

      // Load URLs
      async function loadUrls() {
        loading.style.display = "block";
        urlsList.innerHTML = "";
        emptyState.style.display = "none";
        errorDiv.classList.remove("show");

        try {
          const response = await apiFetch("/api/urls");
          if (!response) return;

          if (!response.ok) {
            throw new Error("Failed to load URLs");
          }

          const urls = await response.json();

          loading.style.display = "none";

          if (urls.length === 0) {
            emptyState.style.display = "block";
            return;
          }

          urls.forEach((urlEntry) => {
            const urlCard = createUrlCard(urlEntry);
            urlsList.appendChild(urlCard);
          });
        } catch (error) {
          loading.style.display = "none";
          showError("Failed to load URLs: " + error.message);
        }
      }

      // Create URL card element
      function createUrlCard(urlEntry) {
        const card = document.createElement("div");
        card.className = "url-card";
        card.setAttribute("data-short-code", urlEntry.short_code);

        const shortUrl = `${window.location.origin}/${urlEntry.short_code}`;
        const displayName = urlEntry.name || "Unnamed URL";
        const escapedName = (urlEntry.name || "").replace(/'/g, "\\'").replace(/"/g, "&quot;");


        // Header
        const header = document.createElement("div");
        header.className = "url-card-header";

        // URL info section
        const urlInfo = document.createElement("div");
        urlInfo.className = "url-info";

        // Name section
        const nameSection = document.createElement("div");
        nameSection.className = "url-name-section";

        const nameSpan = document.createElement("span");
        nameSpan.className = "url-name";
        nameSpan.setAttribute("data-short-code", urlEntry.short_code);
        nameSpan.textContent = displayName;

        const renameBtn = document.createElement("button");
        renameBtn.className = "rename-btn";
        renameBtn.title = "Rename";
        renameBtn.textContent = "✏️";
        renameBtn.addEventListener("click", () => toggleRename(urlEntry.short_code));

        nameSection.appendChild(nameSpan);
        nameSection.appendChild(renameBtn);

        // Rename form
        const renameForm = document.createElement("div");
        renameForm.className = "rename-form";
        renameForm.id = `rename-form-${urlEntry.short_code}`;
        renameForm.style.display = "none";

        const renameInput = document.createElement("input");
        renameInput.type = "text";
        renameInput.className = "rename-input";
        renameInput.id = `rename-input-${urlEntry.short_code}`;
        renameInput.value = urlEntry.name || "";
        renameInput.placeholder = "Enter URL name";

        const saveBtn = document.createElement("button");
        saveBtn.className = "save-rename-btn";
        saveBtn.textContent = "Save";
        saveBtn.addEventListener("click", () => saveRename(urlEntry.short_code));

        const cancelBtn = document.createElement("button");
        cancelBtn.className = "cancel-rename-btn";
        cancelBtn.textContent = "Cancel";
        cancelBtn.addEventListener("click", () => cancelRename(urlEntry.short_code));

        renameForm.appendChild(renameInput);
        renameForm.appendChild(saveBtn);
        renameForm.appendChild(cancelBtn);

        // Short code display
        const shortCodeDiv = document.createElement("div");
        shortCodeDiv.className = "short-code";
        shortCodeDiv.textContent = `/${urlEntry.short_code}`;

        // Original URL display
        const originalUrlDiv = document.createElement("div");
        originalUrlDiv.className = "original-url";
        originalUrlDiv.textContent = urlEntry.original_url;

        urlInfo.appendChild(nameSection);
        urlInfo.appendChild(renameForm);
        urlInfo.appendChild(shortCodeDiv);
        urlInfo.appendChild(originalUrlDiv);

        // Stats section
        const urlStats = document.createElement("div");
        urlStats.className = "url-stats";
        const stat = document.createElement("div");
        stat.className = "stat";
        const statValue = document.createElement("span");
        statValue.className = "stat-value";
        statValue.textContent = urlEntry.clicks;
        const statLabel = document.createElement("span");
        statLabel.className = "stat-label";
        statLabel.textContent = "Clicks";
        stat.appendChild(statValue);
        stat.appendChild(statLabel);
        urlStats.appendChild(stat);

        header.appendChild(urlInfo);
        header.appendChild(urlStats);

        // Actions section
        const actions = document.createElement("div");
        actions.className = "url-card-actions";

        const urlDisplay = document.createElement("input");
        urlDisplay.type = "text";
        urlDisplay.value = shortUrl;
        urlDisplay.readOnly = true;
        urlDisplay.className = "url-display";

        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn";
        copyBtn.textContent = "Copy";
        copyBtn.addEventListener("click", function () { copyToClipboard(shortUrl, this); });

        const visitLink = document.createElement("a");
        visitLink.href = `/${urlEntry.short_code}`;
        visitLink.target = "_blank";
        visitLink.className = "visit-btn";
        visitLink.textContent = "Visit";

        const qrBtn = document.createElement("button");
        qrBtn.className = "qr-btn";
        qrBtn.textContent = "🔲 QR Code";
        qrBtn.addEventListener("click", () => showQRCode(urlEntry.short_code));

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "Delete";
        deleteBtn.addEventListener("click", function () { deleteUrl(urlEntry.short_code, this); });

        actions.appendChild(urlDisplay);
        actions.appendChild(copyBtn);
        actions.appendChild(visitLink);
        actions.appendChild(qrBtn);
        actions.appendChild(deleteBtn);

        card.appendChild(header);
        card.appendChild(actions);

        card.innerHTML = `
                <div class="url-card-header">
                    <div class="url-info">
                        <div class="url-name-row">
                            <span class="url-name" data-short-code="${urlEntry.short_code}">${displayName}</span>
                            <button class="rename-btn" onclick="toggleRename('${
                              urlEntry.short_code
                            }')" title="Rename">✏️</button>
                            <span class="click-pill">
                                <span class="click-pill-value">${urlEntry.clicks}</span>
                                <span class="click-pill-label">${urlEntry.clicks === 1 ? 'click' : 'clicks'}</span>
                            </span>
                        </div>
                        <div class="rename-form" id="rename-form-${urlEntry.short_code}" style="display: none;">
                            <input type="text" class="rename-input" id="rename-input-${urlEntry.short_code}"
                                   value="${escapedName}" placeholder="Enter URL name">
                            <button class="save-rename-btn" onclick="saveRename('${urlEntry.short_code}')">Save</button>
                            <button class="cancel-rename-btn" onclick="cancelRename('${
                              urlEntry.short_code
                            }')">Cancel</button>
                        </div>
                        <div class="short-code">
                            /${urlEntry.short_code}
                            <button class="short-code-copy" onclick="copyToClipboard('${shortUrl}', this)" title="Copy short URL">📋</button>
                        </div>
                        <div class="original-url">${urlEntry.original_url}</div>
                    </div>
                </div>
                <div class="url-card-actions">
                    <button class="action-btn" onclick="copyToClipboard('${shortUrl}', this)">📋 Copy</button>
                    <a href="/${urlEntry.short_code}" target="_blank" class="action-btn">↗ Visit</a>
                    <button class="action-btn" onclick="showQRCode('${urlEntry.short_code}')">🔲 QR</button>
                    <button class="action-btn action-btn--delete" onclick="deleteUrl('${urlEntry.short_code}', this)">🗑 Delete</button>
                </div>
            `;


        return card;
      }

      // Copy to clipboard with fallback
      window.copyToClipboard = async function (text, button) {
        try {
          // Try modern clipboard API first
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
          } else {
            // Fallback for older browsers or non-secure contexts
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
              document.execCommand('copy');
            } catch (err) {
              console.error('Fallback copy failed:', err);
              throw new Error('Copy failed');
            } finally {
              textArea.remove();
            }
          }

          const originalText = button.textContent;
          button.textContent = "Copied!";
          button.classList.add("copied");

          setTimeout(() => {
            button.textContent = originalText;
            button.classList.remove("copied");
          }, 2000);
        } catch (error) {
          console.error("Copy error:", error);
          alert("Failed to copy to clipboard. Please copy manually.");
        }
      };

      // Delete URL
      window.deleteUrl = async function (shortCode, button) {
        if (!confirm("Are you sure you want to delete this URL? This action cannot be undone.")) {
          return;
        }

        const originalText = button.textContent;
        button.disabled = true;
        button.textContent = "Deleting...";

        try {
          const response = await apiFetch(`/api/urls/${shortCode}`, {
            method: "DELETE",
          });
          if (!response) return;

          if (!response.ok) {
            const data = await response.json();
            throw new Error(data.error || "Failed to delete URL");
          }

          // Remove the card from the DOM with animation
          const card = button.closest(".url-card");
          card.style.opacity = "0";
          card.style.transform = "translateX(-20px)";

          setTimeout(() => {
            card.remove();

            // Check if list is now empty
            if (urlsList.children.length === 0) {
              emptyState.style.display = "block";
            }
          }, 300);

          // Show success message
          successDiv.innerHTML = "<strong>✓ URL deleted successfully!</strong>";
          successDiv.classList.add("show");
          setTimeout(() => {
            successDiv.classList.remove("show");
          }, 3000);
        } catch (error) {
          showError("Failed to delete URL: " + error.message);
          button.disabled = false;
          button.textContent = originalText;
        }
      };

      // Toggle rename form
      window.toggleRename = function (shortCode) {
        const renameForm = document.getElementById(`rename-form-${shortCode}`);
        const nameRow = document.querySelector(`.url-name[data-short-code="${shortCode}"]`).parentElement;

        if (renameForm.style.display === "none") {
          renameForm.style.display = "flex";
          nameRow.querySelector(".url-name").style.display = "none";
          nameRow.querySelector(".rename-btn").style.display = "none";
          document.getElementById(`rename-input-${shortCode}`).focus();
        } else {
          renameForm.style.display = "none";
          nameRow.querySelector(".url-name").style.display = "inline";
          nameRow.querySelector(".rename-btn").style.display = "inline";
        }
      };

      // Cancel rename
      window.cancelRename = function (shortCode) {
        toggleRename(shortCode);
      };

      // Save rename
      window.saveRename = async function (shortCode) {
        const input = document.getElementById(`rename-input-${shortCode}`);
        const newName = input.value.trim();

        try {
          const response = await apiFetch(`/api/urls/${shortCode}/name`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: newName || null }),
          });
          if (!response) return;

          if (!response.ok) {
            const data = await response.json();
            throw new Error(data.error || "Failed to update URL name");
          }

          // Update the display
          const nameSpan = document.querySelector(`.url-name[data-short-code="${shortCode}"]`);
          nameSpan.textContent = newName || "Unnamed URL";
          toggleRename(shortCode);

          // Show success message
          successDiv.innerHTML = "<strong>✓ URL name updated successfully!</strong>";
          successDiv.classList.add("show");
          setTimeout(() => {
            successDiv.classList.remove("show");
          }, 3000);
        } catch (error) {
          showError("Failed to update URL name: " + error.message);
        }
      };

      // Refresh button
      refreshBtn.addEventListener("click", loadUrls);

      // Show error
      function showError(message) {
        errorDiv.textContent = message;
        errorDiv.classList.add("show");
      }

      // QR Code functionality
      let currentQRShortCode = null;

      window.showQRCode = async function (shortCode) {
        currentQRShortCode = shortCode;
        const modal = document.getElementById("qrModal");
        const qrLoading = document.getElementById("qrLoading");
        const qrDisplay = document.getElementById("qrDisplay");
        const qrImage = document.getElementById("qrImage");
        const qrUrl = document.getElementById("qrUrl");
        const downloadPngBtn = document.getElementById("downloadPngBtn");
        const downloadSvgBtn = document.getElementById("downloadSvgBtn");

        // Show modal and loading state
        modal.style.display = "flex";
        qrLoading.style.display = "block";
        qrDisplay.style.display = "none";
        downloadPngBtn.style.display = "none";
        downloadSvgBtn.style.display = "none";

        try {
          // Fetch QR code PNG
          const response = await apiFetch(`/api/urls/${shortCode}/qr/png`);
          if (!response) return;

          if (!response.ok) {
            throw new Error("Failed to generate QR code");
          }

          // Convert response to blob and create object URL
          const blob = await response.blob();
          const imageUrl = URL.createObjectURL(blob);

          // Display QR code
          qrImage.src = imageUrl;
          const shortUrl = `${window.location.origin}/${shortCode}`;
          qrUrl.textContent = shortUrl;

          qrLoading.style.display = "none";
          qrDisplay.style.display = "block";
          downloadPngBtn.style.display = "inline-block";
          downloadSvgBtn.style.display = "inline-block";
        } catch (error) {
          qrLoading.textContent = "Failed to generate QR code";
          console.error("QR code error:", error);
        }
      };

      window.downloadQR = async function (format) {
        if (!currentQRShortCode) return;

        try {
          const response = await apiFetch(`/api/urls/${currentQRShortCode}/qr/${format}`);

          if (!response.ok) {
            throw new Error("Failed to download QR code");
          }

          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `${currentQRShortCode}.${format}`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (error) {
          showError("Failed to download QR code: " + error.message);
        }
      };

      window.closeQRModal = function () {
        const modal = document.getElementById("qrModal");
        modal.style.display = "none";
        currentQRShortCode = null;

        // Revoke object URL to free memory
        const qrImage = document.getElementById("qrImage");
        if (qrImage.src) {
          URL.revokeObjectURL(qrImage.src);
          qrImage.src = "";
        }
      };

      // Close modal when clicking outside
      document.getElementById("qrModal").addEventListener("click", function (e) {
        if (e.target === this) {
          closeQRModal();
        }
      });

      // Initial load
      initDashboard();
    </script>
  </body>
</html>
