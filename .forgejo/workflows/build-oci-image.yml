---

# Build OCI images and push to Forgejo Container Registry.
name: Build OCI containers

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "src/**"
      - "static/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "Dockerfile"
      - "oci-build/**"
      - ".forgejo/workflows/build-oci-image.yml"

jobs:
  build-and-push:
    name: Build and push ${{ matrix.image }}
    runs-on: ${{ vars.RUNS_ON_OPENSUSE_BASE_LATEST }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: rus
            build_mode: standalone
          - image: rus-saas
            build_mode: saas
    env:
      IMAGE_REGISTRY: ""
      REGISTRY_PROVIDER: dev.a8n.run
      REGISTRY_OWNER: ${{ vars.A8N_TOOLS_PRIVATE_PACKAGE_OWNER }}
      REGISTRY_USER: ""
      REGISTRY_PASSWORD: ${{ secrets.A8N_TOOLS_PRIVATE_PACKAGE_PAT }}

    steps:
      - name: Clone the repository
        uses: https://code.forgejo.org/actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Verify Docker availability
        run: |
          docker version
          docker buildx version

      - name: Set environment variables
        shell: nu {0}
        run: |
          let owner = $env.REGISTRY_OWNER
          $"REGISTRY_USER=($owner)\n" | save --append $env.GITHUB_ENV
          $"IMAGE_REGISTRY=($env.REGISTRY_PROVIDER)/($owner)\n" | save --append $env.GITHUB_ENV

      - name: Get image tags
        id: get-tags
        shell: nu {0}
        run: |
          let tags = (^nu oci-build/get-tags.nu --joined)
          $"tags=($tags)\n" | save --append $env.GITHUB_OUTPUT

      - name: Capture version metadata
        id: version
        shell: nu {0}
        run: |
          let git_tag = (^git describe --tags --always --dirty | str trim)
          let git_hash = (^git rev-parse --short=12 HEAD | str trim)
          let build_date = (date now | format date "%Y-%m-%dT%H:%M:%SZ")
          $"git_tag=($git_tag)\n" | save --append $env.GITHUB_OUTPUT
          $"git_hash=($git_hash)\n" | save --append $env.GITHUB_OUTPUT
          $"build_date=($build_date)\n" | save --append $env.GITHUB_OUTPUT
          print $"GIT_TAG=($git_tag)"
          print $"GIT_HASH=($git_hash)"
          print $"BUILD_DATE=($build_date)"

      - name: Log in to container registry
        shell: nu {0}
        run: |
          ^docker login --username $env.REGISTRY_USER --password $env.REGISTRY_PASSWORD $env.REGISTRY_PROVIDER

      - name: Build and push image
        shell: nu {0}
        run: |
          let tags_str = "${{ steps.get-tags.outputs.tags }}"
          let tags = ($tags_str | split row ",")
          let image = "${{ matrix.image }}"
          let build_mode = "${{ matrix.build_mode }}"
          let git_tag = "${{ steps.version.outputs.git_tag }}"
          let git_hash = "${{ steps.version.outputs.git_hash }}"
          let build_date = "${{ steps.version.outputs.build_date }}"
          let registry = $env.IMAGE_REGISTRY
          let tag_args = ($tags | each {|tag| [-t $"($registry)/($image):($tag)"]} | flatten)
          let cache_from = $"type=registry,ref=($registry)/($image):latest"
          print $"Building and pushing ($image) [($build_mode) mode] with tags: ($tags_str)"
          (
            ^docker buildx build --push
              --build-arg $"BUILD_MODE=($build_mode)"
              --build-arg $"GIT_TAG=($git_tag)"
              --build-arg $"GIT_HASH=($git_hash)"
              --build-arg $"BUILD_DATE=($build_date)"
              --cache-from $cache_from
              --cache-to type=inline
              ...$tag_args
              -f oci-build/Dockerfile .
          )

      - name: Print image URLs
        shell: nu {0}
        run: |
          let tags_str = "${{ steps.get-tags.outputs.tags }}"
          let tags = ($tags_str | split row ",")
          let image = "${{ matrix.image }}"
          let registry = $env.IMAGE_REGISTRY
          for tag in $tags {
            print $"Image pushed to ($registry)/($image):($tag)"
          }
