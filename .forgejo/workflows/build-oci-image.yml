---

# Build OCI images and push to Forgejo Container Registry.
name: Build OCI containers

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "src/**"
      - "static/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "Dockerfile"
      - "oci-build/**"
      - ".forgejo/workflows/build-oci-image.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build, compute tags and print every registry action without pushing"
        type: boolean
        default: true
      simulate_tag:
        description: "Version like v9.9.9 to exercise the release publish path; empty exercises latest"
        type: string
        default: ""

jobs:
  build-and-push:
    name: Build and push ${{ matrix.image }}
    runs-on: ${{ vars.RUNS_ON_OPENSUSE_BASE_LATEST }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: rus
            build_mode: standalone
          - image: rus-saas
            build_mode: saas
    env:
      IMAGE_REGISTRY: ""
      REGISTRY_PROVIDER: dev.a8n.run
      REGISTRY_OWNER: ${{ vars.A8N_TOOLS_PRIVATE_PACKAGE_OWNER }}
      REGISTRY_USER: ""
      REGISTRY_PASSWORD: ${{ secrets.A8N_TOOLS_PRIVATE_PACKAGE_PAT }}

    steps:
      - name: Clone the repository
        uses: https://code.forgejo.org/actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify Docker availability
        run: |
          docker version
          docker buildx version

      - name: Set environment variables
        shell: nu {0}
        run: |
          let owner = $env.REGISTRY_OWNER
          $"REGISTRY_USER=($owner)\n" | save --append $env.GITHUB_ENV
          $"IMAGE_REGISTRY=($env.REGISTRY_PROVIDER)/($owner)\n" | save --append $env.GITHUB_ENV

      - name: Resolve publish mode, train and tag
        id: resolve
        shell: nu {0}
        run: |
          # Derive the publish mode from the trigger, never from git describe:
          # a tag ref -> release (push :vX.Y.Z only), a main push -> latest
          # (push :latest only), a manual run -> dry-run. A release commit fires
          # BOTH the main-push and the tag-push events; resolving disjoint tags
          # per trigger is what stops the two runs from racing to overwrite the
          # same :latest tag (governance GOV-13).
          let event = "${{ github.event_name }}"
          let ref_type = "${{ github.ref_type }}"
          let ref_name = "${{ github.ref_name }}"
          let simulate_tag = "${{ inputs.simulate_tag }}"
          let mode = if $event == "workflow_dispatch" {
            "dry-run"
          } else if $ref_type == "tag" {
            "release"
          } else {
            "latest"
          }
          # A manual run only mutates the registry if dry_run is explicitly false;
          # the input defaults to true, and push events always publish for real.
          let dry_run = ($event == "workflow_dispatch" and "${{ inputs.dry_run }}" != "false")
          let r = (^nu oci-build/get-tags.nu --mode $mode --ref-name $ref_name --simulate-tag $simulate_tag --json | from json)
          $"mode=($r.mode)\n" | save --append $env.GITHUB_OUTPUT
          $"train=($r.train)\n" | save --append $env.GITHUB_OUTPUT
          $"tag=($r.tag)\n" | save --append $env.GITHUB_OUTPUT
          $"describe=($r.describe)\n" | save --append $env.GITHUB_OUTPUT
          $"dry_run=($dry_run)\n" | save --append $env.GITHUB_OUTPUT
          print $"mode=($r.mode) train=($r.train) tag=($r.tag) describe=($r.describe) dry_run=($dry_run)"

      - name: Capture version metadata
        id: version
        shell: nu {0}
        run: |
          let git_tag = (^git describe --tags --always --dirty | str trim)
          let git_hash = (^git rev-parse --short=12 HEAD | str trim)
          let build_date = (date now | format date "%Y-%m-%dT%H:%M:%SZ")
          $"git_tag=($git_tag)\n" | save --append $env.GITHUB_OUTPUT
          $"git_hash=($git_hash)\n" | save --append $env.GITHUB_OUTPUT
          $"build_date=($build_date)\n" | save --append $env.GITHUB_OUTPUT
          print $"GIT_TAG=($git_tag)"
          print $"GIT_HASH=($git_hash)"
          print $"BUILD_DATE=($build_date)"

      - name: Log in to container registry
        shell: nu {0}
        run: |
          ^docker login --username $env.REGISTRY_USER --password $env.REGISTRY_PASSWORD $env.REGISTRY_PROVIDER

      - name: Build and push image
        shell: nu {0}
        run: |
          let tag = "${{ steps.resolve.outputs.tag }}"
          let dry_run = ("${{ steps.resolve.outputs.dry_run }}" == "true")
          let image = "${{ matrix.image }}"
          let build_mode = "${{ matrix.build_mode }}"
          let git_tag = "${{ steps.version.outputs.git_tag }}"
          let git_hash = "${{ steps.version.outputs.git_hash }}"
          let build_date = "${{ steps.version.outputs.build_date }}"
          let registry = $env.IMAGE_REGISTRY
          let tag_args = [-t $"($registry)/($image):($tag)"]
          let cache_from = $"type=registry,ref=($registry)/($image):latest"
          # dry-run builds locally and writes nothing (no push, no cache export):
          let push_args = if $dry_run { [--load] } else { [--push --cache-to type=inline] }
          let action = if $dry_run { "[dry-run] WOULD build and push" } else { "Building and pushing" }
          print $"($action) ($image) [($build_mode) mode] with tag: ($tag)"
          (
            ^docker buildx build ...$push_args
              --build-arg $"BUILD_MODE=($build_mode)"
              --build-arg $"GIT_TAG=($git_tag)"
              --build-arg $"GIT_HASH=($git_hash)"
              --build-arg $"BUILD_DATE=($build_date)"
              --cache-from $cache_from
              ...$tag_args
              -f oci-build/Dockerfile .
          )

      - name: Print image URLs
        shell: nu {0}
        run: |
          let tag = "${{ steps.resolve.outputs.tag }}"
          let dry_run = ("${{ steps.resolve.outputs.dry_run }}" == "true")
          let prefix = if $dry_run { "[dry-run] WOULD push image to" } else { "Image pushed to" }
          let image = "${{ matrix.image }}"
          let registry = $env.IMAGE_REGISTRY
          print $"($prefix) ($registry)/($image):($tag)"
